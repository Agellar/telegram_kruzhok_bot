services:
  bot:
    build: .
    container_name: telegram_kruzhok_bot
    restart: unless-stopped
    env_file: .env
    environment:
      STATS_DB: /data/stats.db
    volumes:
      - botdata:/data
      - /tmp/videobot:/tmp/videobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    build: ./admin
    container_name: kruzhok_admin
    restart: unless-stopped
    env_file: .env
    environment:
      STATS_DB: /data/stats.db
    volumes:
      # rw-монтирование нужно для SQLite WAL (-shm/-wal sidecar-файлы),
      # сама админка открывает БД в режиме query_only=ON и только читает.
      - botdata:/data
    expose:
      - "8000"

  web:
    # Публичный конвертер видео → видеокружок (ffmpeg). Без авторизации.
    build: ./web
    container_name: kruzhok_web
    restart: unless-stopped
    environment:
      WEB_MAX_FILE_MB: "${WEB_MAX_FILE_MB:-50}"
      WEB_MAX_PARALLEL: "${WEB_MAX_PARALLEL:-2}"
      WEB_RATE_SECONDS: "${WEB_RATE_SECONDS:-15}"
      STATS_DB: /data/stats.db
    volumes:
      # пишет статистику веб-конвертаций в общую БД (таблица web_jobs)
      - botdata:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2
    container_name: kruzhok_caddy
    restart: unless-stopped
    depends_on:
      - admin
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  botdata:
  caddy_data:
  caddy_config:
