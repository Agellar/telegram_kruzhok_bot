services:
  # Локальный Bot API сервер — снимает лимит 20 МБ на скачивание файлов
  # и поднимает потолок до 2 ГБ. Использует api_id/api_hash с my.telegram.org.
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: "1"
      TELEGRAM_STAT: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    # Порт наружу НЕ публикуем — общение идёт по внутренней сети compose.
    expose:
      - "8081"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      CHANNEL_ID: "${CHANNEL_ID}"
      MAX_PARALLEL: "${MAX_PARALLEL:-2}"
      USER_COOLDOWN: "${USER_COOLDOWN:-5}"
      MAX_FILE_MB: "${MAX_FILE_MB:-500}"
      TELEGRAM_API_BASE: "http://telegram-bot-api:8081"
      TEMP_DIR: "/var/lib/telegram-bot-api/tmp"
    volumes:
      # Тот же том, что и у API-сервера — бот читает файлы прямо с диска,
      # а не качает их по HTTP. В локальном режиме это критично.
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  telegram-bot-api-data:
